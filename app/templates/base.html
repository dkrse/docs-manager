<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Document Manager{% endblock %}</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/flatpickr.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <script>
        (function(){
            var t = document.cookie.match(/(?:^|;)\s*theme=(\w+)/);
            var theme = t ? t[1] : 'light';
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>
</head>
<body>
{% if user is defined and user %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/"><i class="bi bi-file-earmark-pdf"></i> Document Manager</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                {% if not user.is_admin %}
                <li class="nav-item"><a class="nav-link" href="/upload">Upload</a></li>
                {% endif %}
                {% if user.is_admin %}
                <li class="nav-item"><a class="nav-link" href="/admin/users">Users</a></li>
                {% endif %}
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/help"><i class="bi bi-question-circle"></i></a></li>
                <li class="nav-item"><a class="nav-link" href="/settings"><i class="bi bi-gear"></i></a></li>
                <li class="nav-item"><a class="nav-link" href="/change-password"><i class="bi bi-key"></i> {{ user.username }}</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
            </ul>
        </div>
    </div>
</nav>
{% endif %}
<div class="container-fluid mt-3">
    {% block content %}{% endblock %}
</div>
<script src="/static/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/flatpickr.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
